<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In - Online Banking</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyDnkCQOgU1FGZL3rjck9YI7wxdltHxI_L0",
        authDomain: "strekwell.firebaseapp.com",
        projectId: "strekwell",
        storageBucket: "strekwell.firebasestorage.app",
        messagingSenderId: "413018374090",
        appId: "1:413018374090:web:c3fa0e5577a20ac04ed933"
    };

    // Initialize Firebase (compat version)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
</script>
</head>

<body>
    <div class="container-login">
        <a href="index.html" class="back-arrow"><i class="fas fa-arrow-left"></i></a>
        <h3 class="text-center mb-4" style="color:#3b82f6;">Sign In</h3>

        <form onsubmit="loginUser(event)">
            <div class="form-group">
                <i class="fas fa-user input-icon"></i>
                <input type="email" class="form-control" id="email" placeholder="Email" required />
            </div>

            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder="Password" required />
                <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
            </div>

            <div class="d-flex justify-content-end mb-3">
                <a href="#" style="font-size: 13px; color: #888;">Need Help?</a>
            </div>

            <button type="submit" class="btn btn-login">Login</button>

            <div class="bottom-links">Don't Have An Account? <a href="register.html">Sign Up</a></div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (password.type === "password") {
                password.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                password.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function loginUser(event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;

                const snapshot = await firebase.database().ref(`users/${uid}`).once('value');
                const userData = snapshot.val();

                if (!userData) {
                    alert("User not found in Online Banking.");
                    return;
                }

                // Redirect to online banking dashboard
                window.location.href = "dashboard.html";

            } catch (error) {
                alert("Login failed: " + error.message);
            }
        }
    </script>

</body>

</html>
