<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Investment Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admininvest.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
</head>

<body>
    <div class="admin-header">
        <h1><i class="fas fa-chart-line"></i> Investment Admin Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="admin-table-container">
        <table id="investmentTable">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Daily Asset</th>
                    <th>Trading</th>
                    <th>RA</th>
                    <th>Total</th>
                    <th>Credit</th>
                    <th>Debit</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Funding Modal -->
    <div id="fundingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeFundingModal()">×</span>
            <h2>Fund User</h2>
            <p>Funding User: <span id="fundingUserName"></span> (<span id="fundingUserId"></span>)</p>
            <div class="form-group">
                <label for="assetType">Select Asset to Fund:</label>
                <select id="assetType" class="form-control">
                    <option value="dailyAsset">Daily Asset</option>
                    <option value="tradingBonus">Trading Bonus</option>
                    <option value="referralBonus">RA (Referral Bonus)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fundingAmount">Amount:</label>
                <input type="number" id="fundingAmount" class="form-control" min="0" step="0.01" required>
            </div>
            <button class="btn btn-primary" onclick="processFunding()">Fund User</button>
        </div>
    </div>

    <!-- Chat Modal -->
    <div id="chatModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeChatModal()">×</span>
            <h2>Chat with User: <span id="chatUserName"></span></h2>
            <div id="chatMessages"></div>
            <div class="message-input-area">
                <input type="text" id="chatInput" class="form-control" placeholder="Type a message...">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <h2 style="margin:1rem 0;">Pending Withdrawal Requests</h2>
    <div style="margin:1rem;">
        <table id="pendingRequestsTable" style="width:100%; border-collapse: collapse; border:1px solid #ccc;">
            <thead style="background:#eee;">
                <tr>
                    <th style="padding:0.5rem;">User</th>
                    <th style="padding:0.5rem;">Method</th>
                    <th style="padding:0.5rem;">Amount</th>
                    <th style="padding:0.5rem;">Details</th>
                    <th style="padding:0.5rem;">Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
       const firebaseConfig = {
  apiKey: "AIzaSyBf2PNlVWN0hZ1_HGPao6UHSF2Jlre-l5M",
  authDomain: "strek-d3407.firebaseapp.com",
  projectId: "strek-d3407",
  storageBucket: "strek-d3407.firebasestorage.app",
  messagingSenderId: "70106729135",
  appId: "1:70106729135:web:b29aa51a407f9a2dc9e25a"
};

    // Initialize Firebase (compat version)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

        let currentUserUidToFund = null;
        let currentUserUidToChat = null;
        let chatListener = null;

        // Firebase Auth State
        firebase.auth().onAuthStateChanged(user => {
            if (!user) window.location.href = "adminlogin.html";
            else {
                loadInvestmentData();
                loadPendingRequests();
            }
        });

        // Logout
        function logout() {
            firebase.auth().signOut().then(() => window.location.href = "adminlogin.html");
        }

        // Load users into table
        function loadInvestmentData() {
            const tbody = document.querySelector("#investmentTable tbody");
            tbody.innerHTML = "";
            firebase.database().ref("investors").once("value", snapshot => {
                snapshot.forEach(userSnap => {
                    const uid = userSnap.key;
                    const user = userSnap.val();

                    // Calculate total credit and debit
                    const totalCredit = user.creditHistory
                        ? (Array.isArray(user.creditHistory)
                            ? user.creditHistory.reduce((sum, t) => sum + (t.type === 'credit' ? t.amount : 0), 0)
                            : Object.values(user.creditHistory).reduce((sum, t) => sum + (t.type === 'credit' ? t.amount : 0), 0))
                        : 0;
                    const totalDebit = user.depositHistory
                        ? (Array.isArray(user.depositHistory)
                            ? user.depositHistory.reduce((sum, t) => sum + (t.type === 'debit' ? t.amount : 0), 0)
                            : Object.values(user.depositHistory).reduce((sum, t) => sum + (t.type === 'debit' ? t.amount : 0), 0))
                        : 0;

                    const row = document.createElement("tr");
                    row.innerHTML = `
                <td>${user.fullname || "N/A"}</td>
                <td>${user.userId || "N/A"}</td>
                <td>${user.email || "N/A"}</td>
                <td>${user.phone || "N/A"}</td>
                <td>${user.dailyAsset || 0}</td>
                <td>${user.tradingBonus || 0}</td>
                <td>${user.referralBonus || 0}</td>
                <td>${user.totalAsset || 0}</td>
                <td>${totalCredit}</td>
                <td>${totalDebit}</td>
                <td>
                    <div class="action-icons">
                        <i class="fas fa-arrow-up action-icon" title="Fund User" onclick="openFundingModal('${uid}', '${user.fullname}', '${user.userId}')"></i>
                        <i class="fas fa-comment action-icon" title="Chat with User" onclick="openChat('${uid}', '${user.fullname}')"></i>
                        <i class="fas fa-trash-alt action-icon delete-icon" title="Delete User" onclick="confirmDeleteUser('${uid}', '${user.fullname}')"></i>
                    </div>
                </td>
            `;
                    tbody.appendChild(row);
                });
            });
        }

        // Load pending withdrawal requests
        function loadPendingRequests() {
            const tbody = document.querySelector("#pendingRequestsTable tbody");
            tbody.innerHTML = "";
            firebase.database().ref("withdrawalRequests")
                .orderByChild("status")
                .equalTo("pending")
                .once("value", snapshot => {
                    if (!snapshot.exists()) return;
                    snapshot.forEach(reqSnap => {
                        const req = reqSnap.val();
                        const requestId = reqSnap.key;
                        const details = req.method === 'Bank'
                            ? 'Bank: ' + req.accountNumber
                            : 'Wallet: ' + req.walletName + ' (' + req.walletAddress + ')';

                        const row = document.createElement("tr");
                        row.innerHTML = `
                    <td>${req.userName}</td>
                    <td>${req.method}</td>
                    <td>$${req.amount.toFixed(2)}</td>
                    <td>${details}</td>
                    <td>
                        <button onclick="approveRequest('${requestId}')">Approve</button>
                        <button onclick="rejectRequest('${requestId}')">Reject</button>
                    </td>
                `;
                        tbody.appendChild(row);
                    });
                });
        }

        // Approve request
        function approveRequest(requestId) {
            const reqRef = firebase.database().ref("withdrawalRequests/" + requestId);
            reqRef.once("value").then(snapshot => {
                const request = snapshot.val();
                if (!request || request.status !== 'pending') return;
                // Update status to approved
                reqRef.update({ status: 'approved' }).then(() => {
                    const userId = request.userId;
                    const amount = request.amount;
                    const method = request.method;

                    // Add to user's depositHistory
                    firebase.database().ref('investors/' + userId + '/depositHistory').push({
                        amount: amount,
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        type: 'Withdrawal',
                        status: 'approved',
                        method: method,
                        ...(method === 'Bank' ? { accountNumber: request.accountNumber } : { walletName: request.walletName, walletAddress: request.walletAddress })
                    });

                    // Deduct amount from user's totalAsset
                    firebase.database().ref('investors/' + userId).transaction(currentData => {
                        if (currentData) {
                            if (currentData.totalAsset !== undefined) {
                                currentData.totalAsset -= amount;
                                if (currentData.totalAsset < 0) currentData.totalAsset = 0;
                            }
                        }
                        return currentData;
                    }).then(() => {
                        alert("Request approved and balance deducted.");
                        loadPendingRequests();
                        loadInvestmentData();
                    });
                });
            });
        }

        // Reject request
        function rejectRequest(requestId) {
            const reqRef = firebase.database().ref("withdrawalRequests/" + requestId);
            reqRef.once("value").then(snapshot => {
                const request = snapshot.val();
                if (!request || request.status !== 'pending') return;
                // Update status to rejected
                reqRef.update({ status: 'rejected' }).then(() => {
                    const userId = request.userId;
                    const amount = request.amount;
                    const method = request.method;

                    // Add to user's depositHistory as rejected
                    firebase.database().ref('investors/' + userId + '/depositHistory').push({
                        amount: amount,
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        type: 'Withdrawal',
                        status: 'rejected',
                        method: method,
                        ...(method === 'Bank' ? { accountNumber: request.accountNumber } : { walletName: request.walletName, walletAddress: request.walletAddress })
                    });

                    alert("Request rejected.");
                    loadPendingRequests();
                    loadInvestmentData();
                });
            });
        }

        // Funding modal functions
        function openFundingModal(uid, fullname, userId) {
            currentUserUidToFund = uid;
            document.getElementById('fundingUserName').textContent = fullname;
            document.getElementById('fundingUserId').textContent = userId;
            document.getElementById('fundingModal').style.display = 'block';
        }

        function closeFundingModal() {
            document.getElementById('fundingModal').style.display = 'none';
            document.getElementById('assetType').value = 'dailyAsset';
            document.getElementById('fundingAmount').value = '';
            currentUserUidToFund = null;
        }

        async function processFunding() {
            if (!currentUserUidToFund) {
                alert("No user selected for funding.");
                return;
            }
            const assetType = document.getElementById('assetType').value;
            const fundingAmount = parseFloat(document.getElementById('fundingAmount').value);
            if (isNaN(fundingAmount) || fundingAmount <= 0) {
                alert("Please enter a valid funding amount.");
                return;
            }

            const userRef = firebase.database().ref('investors/' + currentUserUidToFund);
            try {
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();
                if (!userData) {
                    alert("User data not found");
                    return;
                }
                // Update the selected asset
                const currentDailyAsset = userData.dailyAsset || 0;
                const currentTradingBonus = userData.tradingBonus || 0;
                const currentReferralBonus = userData.referralBonus || 0;

                let newDailyAsset = currentDailyAsset;
                let newTradingBonus = currentTradingBonus;
                let newReferralBonus = currentReferralBonus;

                if (assetType === 'dailyAsset') newDailyAsset += fundingAmount;
                if (assetType === 'tradingBonus') newTradingBonus += fundingAmount;
                if (assetType === 'referralBonus') newReferralBonus += fundingAmount;

                const newTotalAsset = newDailyAsset + newTradingBonus + newReferralBonus;

                const updates = {
                    dailyAsset: newDailyAsset,
                    tradingBonus: newTradingBonus,
                    referralBonus: newReferralBonus,
                    totalAsset: newTotalAsset
                };

                // Add credit history entry
                await firebase.database().ref('investors/' + currentUserUidToFund + '/creditHistory').push({
                    type: 'credit',
                    amount: fundingAmount,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    fundedBy: 'Admin',
                    assetFunded: assetType
                });

                await userRef.update(updates);
                alert("User funded successfully!");
                closeFundingModal();
                loadInvestmentData();
            } catch (err) {
                alert("Error funding user: " + err.message);
                console.error(err);
            }
        }

        // Chat functions
        function openChat(uid, fullname) {
            currentUserUidToChat = uid;
            document.getElementById('chatUserName').textContent = fullname;
            document.getElementById('chatModal').style.display = 'block';
            loadChatMessages(uid);

            document.getElementById('chatInput').addEventListener('keypress', function (event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    sendMessage();
                }
            });
        }

        function closeChatModal() {
            document.getElementById('chatModal').style.display = 'none';
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatInput').value = '';
            currentUserUidToChat = null;
            if (chatListener) {
                chatListener.off();
                chatListener = null;
            }
        }

        function loadChatMessages(uid) {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '';
            const chatRef = firebase.database().ref('chats/' + uid).orderByChild('timestamp');

            if (chatListener) chatListener.off();

            chatListener = chatRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                displayMessage(msg);
                chatDiv.scrollTop = chatDiv.scrollHeight;
            });
        }

        function displayMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message ' + (msg.sender === 'Admin' ? 'admin' : 'user');

            const senderDiv = document.createElement('div');
            senderDiv.className = 'message-sender';
            senderDiv.textContent = msg.sender + ':';

            const textP = document.createElement('p');
            textP.className = 'message-text';
            textP.textContent = msg.text;

            div.appendChild(senderDiv);
            div.appendChild(textP);

            document.getElementById('chatMessages').appendChild(div);
        }

        function sendMessage() {
            if (!currentUserUidToChat) return;
            const msgInput = document.getElementById('chatInput');
            const text = msgInput.value.trim();
            if (!text) return;

            firebase.database().ref('chats/' + currentUserUidToChat).push({
                text: text,
                sender: 'Admin',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                msgInput.value = '';
            });
        }

        // Delete user
        function confirmDeleteUser(uid, fullname) {
            if (confirm(`Are you sure you want to delete the account for ${fullname}? This action cannot be undone.`)) {
                deleteUserAccount(uid);
            }
        }

        function deleteUserAccount(uid) {
            // Note: Actual deletion of auth user must be done server-side with Firebase Admin SDK
            // Here, only deleting user data from RTDB
            const userRef = firebase.database().ref('investors/' + uid);
            const chatRef = firebase.database().ref('chats/' + uid);
            userRef.remove();
            chatRef.remove();
            alert(`User data for ${uid} deleted from database.`);
            loadInvestmentData();
        }

        // Modal close on outside click
        window.onclick = function (event) {
            if (event.target == document.getElementById('fundingModal')) closeFundingModal();
            if (event.target == document.getElementById('chatModal')) closeChatModal();
            if (event.target == document.getElementById('pendingRequestsTable')) { } // no modal here
        };
    </script>
</body>

</html>
