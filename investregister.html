<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - Investment</title>
    <link rel="stylesheet" href="investregister.css">

    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDnkCQOgU1FGZL3rjck9YI7wxdltHxI_L0",
        authDomain: "strekwell.firebaseapp.com",
        projectId: "strekwell",
        storageBucket: "strekwell.firebasestorage.app",
        messagingSenderId: "413018374090",
        appId: "1:413018374090:web:c3fa0e5577a20ac04ed933"
    };

    // Initialize Firebase (compat version)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    </script>
</head>

<body>
    <div class="container-register">
        <h3 class="text-center text-primary mb-4">Investment Registration</h3>
        <form onsubmit="registerInvestor(event)">
            <div class="form-group">
                <span class="input-icon"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control" placeholder="Full Name" id="fullname" required />
            </div>
            <div class="form-group">
                <span class="input-icon"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control" placeholder="Email" id="email" required />
            </div>
            <!-- ADDED: Phone Number Field -->
            <div class="form-group">
                <span class="input-icon"><i class="fas fa-phone"></i></span>
                <input type="tel" class="form-control" placeholder="Phone Number" id="phone" required />
            </div>
            <!-- End Added Field -->
            <div class="form-group">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" placeholder="Password" id="password"
                    oninput="checkPasswordStrength()" required />
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="form-group">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" placeholder="Confirm Password" id="confirmPassword"
                    required />
            </div>
            <button type="submit" class="btn btn-register mt-3">Register</button>
            <p class="text-center mt-3">
                You have an account? <a href="investlogin.html">Login</a>
            </p>
        </form>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true" style="background: rgba(0,0,0,0.5);">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="modal-body">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <h4 class="mb-2">Registration Successful!</h4>
                    <p>Redirecting to verification...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function generateUserId() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let id = "";
            for (let i = 0; i < 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return "INV-" + id;
        }

        async function registerInvestor(event) {
            event.preventDefault();

            const fullname = document.getElementById("fullname").value;
            const email = document.getElementById("email").value;
            // ADDED: Get phone number value
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                // Firebase Authentication creates the user based on email and password
                const userCred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;
                const userId = generateUserId();

                // Store additional user data (including phone number) in Realtime Database
                await firebase.database().ref('investors/' + uid).set({
                    userId,
                    fullname,
                    email,
                    // ADDED: Store phone number
                    phone,
                    type: "investment",
                    dailyAsset: 0,
                    tradingBonus: 0,
                    referralBonus: 0,
                    totalAsset: 0,
                    creditHistory: [],
                    depositHistory: []
                });

                const modal = new bootstrap.Modal(document.getElementById('successModal'));
                modal.show();

                setTimeout(() => {
                    window.location.href = "dashboardinvest.html";
                }, 3000);
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById("password").value;
            const strengthBar = document.getElementById("strengthBar");
            let strength = 0;

            if (password.length >= 6) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const colors = ["#ddd", "red", "orange", "yellowgreen", "green"];
            strengthBar.style.width = ((strength / 4) * 100) + "%";
            strengthBar.style.backgroundColor = colors[strength];
        }
    </script>
</body>

</html>
