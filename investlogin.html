<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Investment</title>

    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />

    <style>
        body {
            background: linear-gradient(135deg, #3b82f6, #1e3a8a);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .container-login {
            max-width: 400px;
            margin: 8% auto;
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            color: #000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-control {
            padding-left: 35px;
        }

        .input-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #888;
        }

        .btn-login {
            width: 100%;
            background: #1e40af;
            color: #fff;
            font-weight: bold;
        }

        .modal-content {
            border-radius: 15px;
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
        apiKey: "AIzaSyDnkCQOgU1FGZL3rjck9YI7wxdltHxI_L0",
        authDomain: "strekwell.firebaseapp.com",
        projectId: "strekwell",
        storageBucket: "strekwell.firebasestorage.app",
        messagingSenderId: "413018374090",
        appId: "1:413018374090:web:c3fa0e5577a20ac04ed933"
    };

    // Initialize Firebase (compat version)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    </script>
</head>

<body>
    <div class="container-login">
        <h3 class="text-center text-primary mb-4">Investor Login</h3>
        <form onsubmit="loginInvestor(event)">
            <div class="form-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" class="form-control" placeholder="Email" id="email" required />
            </div>
            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control" placeholder="Password" id="password" required />
            </div>
            <button type="submit" class="btn btn-login mt-3">Login</button>
            <p class="text-center mt-3">
                Don't have an account? <a href="investregister.html">Register</a>
            </p>
        </form>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true" style="background: rgba(0,0,0,0.5);">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="modal-body">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <h4 class="mb-2">Login Successful!</h4>
                    <p>Redirecting to your dashboard...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        async function loginInvestor(event) {
            event.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                const modal = new bootstrap.Modal(document.getElementById('loginModal'));
                modal.show();
                setTimeout(() => {
                    window.location.href = "dashboardinvest.html";
                }, 3000);
            } catch (error) {
                alert("Login failed: " + error.message);
            }
        }
    </script>
</body>

</html>
