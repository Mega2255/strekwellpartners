<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - Bank</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="register.css" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

   <script>
   const firebaseConfig = {
  apiKey: "AIzaSyBf2PNlVWN0hZ1_HGPao6UHSF2Jlre-l5M",
  authDomain: "strek-d3407.firebaseapp.com",
  projectId: "strek-d3407",
  storageBucket: "strek-d3407.firebasestorage.app",
  messagingSenderId: "70106729135",
  appId: "1:70106729135:web:b29aa51a407f9a2dc9e25a"
};



    // Initialize Firebase (compat version)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
</script>

</head>

<body>
    <div class="container-login">
        <a href="index.html" class="back-arrow">
            <i class="fas fa-arrow-left"></i>
        </a>

        <h3 class="text-center mb-4" style="color:#3b82f6;">Register</h3>

        <form onsubmit="registerUser(event)">
            <div class="form-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" class="form-control" placeholder="Full Name" id="fullname" required />
            </div>

            <div class="form-group">
                <i class="fas fa-user-circle input-icon"></i>
                <input type="text" class="form-control" placeholder="Username" id="username" required />
            </div>

            <div class="form-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" class="form-control" placeholder="Email" id="email" required />
            </div>

            <div class="form-group">
                <i class="fas fa-phone input-icon"></i>
                <input type="tel" class="form-control" placeholder="Phone Number" id="phoneNumber" required />
            </div>

            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder="Password" required
                    oninput="checkPasswordStrength()" />
                <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                <div id="strength-bar" class="strength-bar"></div>
                <small id="strength-text" class="strength-text"></small>
            </div>

            <div class="form-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control" id="confirm_password" placeholder="Confirm Password"
                    required />
                <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm_password')"></i>
            </div>

            <div class="form-group">
                <i class="fas fa-key input-icon"></i>
                <input type="password" class="form-control" id="pin" placeholder="PIN" required maxlength="6"
                    pattern="[0-9]{4,6}" />
                <i class="fas fa-eye toggle-password" onclick="togglePassword('pin')"></i>
            </div>

            <button type="submit" class="btn btn-login">Sign Up</button>

            <div class="bottom-links">
                Already Have an Account? <a href="login.html">Sign In</a>
            </div>
        </form>
    </div>

    <!-- Success Modal -->
    <div id="successBox" class="modal fade show" tabindex="-1"
        style="display: none; background-color: rgba(0,0,0,0.5);">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4" style="border-radius: 20px;">
                <div class="modal-body">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <h4 class="mb-3">Registration Successful!</h4>
                    <p>You’ll be redirected shortly...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strength-bar');
            const strengthText = document.getElementById('strength-text');

            let strength = 0;
            if (password.length >= 6) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength += 1;

            switch (strength) {
                case 0:
                case 1:
                    strengthBar.style.backgroundColor = '#f87171';
                    strengthText.innerText = "Weak";
                    break;
                case 2:
                    strengthBar.style.backgroundColor = '#facc15';
                    strengthText.innerText = "Medium";
                    break;
                case 3:
                case 4:
                    strengthBar.style.backgroundColor = '#4ade80';
                    strengthText.innerText = "Strong";
                    break;
            }
        }

        function validateForm() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const pin = document.getElementById('pin').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return false;
            }

            let strength = 0;
            if (password.length >= 6) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength += 1;

            if (strength < 2) {
                alert("Please choose a stronger password!");
                return false;
            }

            if (!/^\d{4,6}$/.test(pin)) {
                alert("PIN must be 4 to 6 digits.");
                return false;
            }

            return true;
        }

        function generateAccountNumber() {
            let accountNumber = "";
            for (let i = 0; i < 10; i++) {
                accountNumber += Math.floor(Math.random() * 10);
            }
            return accountNumber;
        }

        async function registerUser(event) {
            event.preventDefault();
            if (!validateForm()) return;

            const fullname = document.getElementById("fullname").value;
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const phoneNumber = document.getElementById("phoneNumber").value;  // Get phone number
            const password = document.getElementById("password").value;
            const pin = document.getElementById("pin").value;
            const accountNumber = generateAccountNumber();

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;

                await firebase.database().ref('users/' + uid).set({
                    fullname: fullname,
                    username: username,
                    email: email,
                    phoneNumber: phoneNumber,
                    pin: pin,
                    accountNumber: accountNumber,
                    balance: 0 // ✅ Initial balance set to $0.00
                });

                document.getElementById("successBox").style.display = "block";
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 3000);
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    </script>
</body>

</html>
